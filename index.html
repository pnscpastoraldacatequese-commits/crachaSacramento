<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Crachás Sacramentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn {
            padding: 12px 24px;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-print { background-color: #27ae60; }

        .container {
            width: 21cm;
            background-color: white;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 1cm 0;
        }

        /* --- Estilo do Crachá --- */
        .cracha {
            width: 9.5cm;
            height: 6.5cm;
            margin: 5px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            border: 1px solid #eee;
        }

        .nome {
            font-size: 32px;
            font-weight: bold;
            color: #000;
            text-transform: uppercase;
            text-align: center;
            padding: 0 15px;
            z-index: 2;
            /* Sombra leve para garantir leitura se o fundo for poluído */
            text-shadow: 2px 2px 4px rgba(255,255,255,0.7);
            word-wrap: break-word;
            max-width: 90%;
        }

        /* Classes de Fundo */
        .fundo-crisma { background-image: url('https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/crachaSacramento/main/Crisma.png'); }
        .fundo-eucaristia { background-image: url('https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/crachaSacramento/main/Eucaristia.png'); }

        @media print {
            .controls { display: none; }
            body { background: none; padding: 0; }
            .container { box-shadow: none; padding: 0; }
            .cracha { 
                margin: 0; 
                border: 1px solid #000; /* Linha de corte */
                page-break-inside: avoid;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label>1. Escolha o Sacramento:</label>
        <select id="tema">
            <option value="fundo-eucaristia">Eucaristia</option>
            <option value="fundo-crisma">Crisma</option>
        </select>

        <label>2. Nomes (separados por vírgula ou linha):</label>
        <textarea id="nomesIn" rows="5" placeholder="João Silva, Maria Oliveira..."></textarea>
        
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn" onclick="gerar()">Gerar Crachás</button>
            <button class="btn btn-print" onclick="window.print()">Imprimir</button>
        </div>
    </div>

    <div class="container" id="painel"></div>

    <script>
        const PREPOSICOES = ['de', 'do', 'da', 'dos', 'das'];

        function processarNomeUnico(nome, todos) {
            const partes = nome.split(' ');
            const primeiro = partes[0];
            const duplicados = todos.filter(n => n.split(' ')[0].toUpperCase() === primeiro.toUpperCase()).length;

            if (duplicados === 1 || partes.length === 1) return primeiro;

            let atual = [primeiro];
            for (let i = 1; i < partes.length; i++) {
                atual.push(partes[i]);
                if (PREPOSICOES.includes(partes[i].toLowerCase()) && partes[i+1]) {
                    atual.push(partes[i+1]);
                    i++;
                }
                let prefixo = atual.join(' ');
                let unico = true;
                for (let outro of todos) {
                    if (outro.toUpperCase() === nome.toUpperCase()) continue;
                    if (outro.toUpperCase().startsWith(prefixo.toUpperCase())) {
                        unico = false;
                        break;
                    }
                }
                if (unico) return prefixo;
            }
            return nome;
        }

        function gerar() {
            const raw = document.getElementById('nomesIn').value;
            const listaOriginal = raw.split(/[,\n]/).map(n => n.trim()).filter(n => n.length > 0);
            const tema = document.getElementById('tema').value;
            const painel = document.getElementById('painel');
            
            painel.innerHTML = '';

            listaOriginal.forEach(n => {
                const nomeCurto = processarNomeUnico(n, listaOriginal);
                const div = document.createElement('div');
                div.className = `cracha ${tema}`;
                
                const h1 = document.createElement('h1');
                h1.className = 'nome';
                h1.textContent = nomeCurto;
                
                div.appendChild(h1);
                painel.appendChild(div);
            });
        }
    </script>
</body>
</html>
