<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crachás Sacramentos - Alta Precisão</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f4f9; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 80vw; max-width: 600px; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        select { width: 100%; padding: 10px; border-radius: 8px; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-generate { background-color: #4A90E2; }
        .btn-print { background-color: #27ae60; }

        .container { width: 21cm; background-color: white; display: flex; flex-wrap: wrap; justify-content: flex-start; padding: 0; margin: 0 auto; }
        .cracha { 
            width: 9.5cm; height: 6.5cm; box-sizing: border-box; display: flex; align-items: center; justify-content: center; 
            position: relative; background-size: 100% 100%; background-repeat: no-repeat; border: 1px solid #000; margin: 2px; 
        }
        .nome { font-size: 32px; font-weight: bold; color: #000; text-transform: uppercase; text-align: center; padding: 0 20px; word-wrap: break-word; max-width: 90%; z-index: 2; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }
        .fundo-crisma { background-image: url('https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/crachaSacramento/main/Crisma.png'); }
        .fundo-eucaristia { background-image: url('https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/crachaSacramento/main/Eucaristia.png'); }

        @media print {
            body { background: white; padding: 0; }
            .controls { display: none; }
            .container { box-shadow: none; width: 21cm; height: 29.7cm; padding: 0.5cm; }
            .cracha { margin: 0; border: 0.5pt solid #000; page-break-inside: avoid; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .cracha:nth-child(8n+9) { page-break-before: always; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label>1. Sacramento:</label>
        <select id="tema">
            <option value="fundo-eucaristia">Eucaristia</option>
            <option value="fundo-crisma">Crisma</option>
        </select>
        <label style="margin-top:10px;">2. Lista de Nomes:</label>
        <textarea id="inputNomes" rows="5" placeholder="Ex: Maria Luiza Silva, Maria Luisa Santos..."></textarea>
        <div class="btn-group">
            <button class="btn btn-generate" onclick="gerar()">Gerar Crachás</button>
            <button class="btn btn-print" onclick="window.print()">Imprimir</button>
        </div>
    </div>

    <div class="container" id="containerCrachas"></div>

    <script>
        const PREPOSICOES = ['de', 'do', 'da', 'dos', 'das'];

        function saoSemelhantes(s1, s2) {
            if (!s1 || !s2) return false;
            s1 = s1.toUpperCase(); s2 = s2.toUpperCase();
            if (s1 === s2) return true;
            if (Math.abs(s1.length - s2.length) > 1) return false;
            let erros = 0, i = 0, j = 0;
            while (i < s1.length && j < s2.length) {
                if (s1[i] !== s2[j]) {
                    erros++;
                    if (s1.length > s2.length) i++;
                    else if (s2.length > s1.length) j++;
                    else { i++; j++; }
                } else { i++; j++; }
            }
            return (erros + Math.abs(s1.length - s2.length)) <= 2; 
        }

        function determineProcessedName(name, allNames) {
            const parts = name.split(' ');
            
            // Verifica similaridade nos DOIS primeiros nomes
            const precisaDiferenciar = allNames.some(outro => {
                if (outro === name) return false;
                const outroParts = outro.split(' ');
                
                const primSemelhante = saoSemelhantes(parts[0], outroParts[0]);
                const segSemelhante = (parts[1] && outroParts[1]) ? saoSemelhantes(parts[1], outroParts[1]) : false;

                // Se os dois primeiros são semelhantes ou iguais, precisamos do terceiro
                return primSemelhante && (parts.length > 1 ? segSemelhante : true);
            });

            if (!precisaDiferenciar || parts.length === 1) return parts[0];

            let current = [parts[0]];
            let i = 1;

            // Loop para construir o nome até que ele seja único na lista
            while (i < parts.length) {
                current.push(parts[i]);
                // Se a parte atual é preposição, pula para o próximo para não terminar em "DE"
                if (PREPOSICOES.includes(parts[i].toLowerCase()) && parts[i+1]) {
                    i++;
                    current.push(parts[i]);
                }
                
                const segment = current.join(' ');
                
                // Checa se este segmento já é suficiente para diferenciar de todos os outros
                let isUnique = true;
                for (const other of allNames) {
                    if (other.toUpperCase() === name.toUpperCase()) continue;
                    // Se algum outro nome começa de forma semelhante ao segmento atual, continua adicionando
                    const otherParts = other.split(' ');
                    const segmentParts = segment.split(' ');
                    
                    let outroComecaIgual = true;
                    for(let j=0; j < segmentParts.length; j++) {
                        if (!saoSemelhantes(segmentParts[j], otherParts[j])) {
                            outroComecaIgual = false;
                            break;
                        }
                    }
                    if (outroComecaIgual) {
                        isUnique = false;
                        break;
                    }
                }

                if (isUnique) return segment;
                i++;
            }
            return name;
        }

        function gerar() {
            const raw = document.getElementById('inputNomes').value;
            const lista = raw.split(/[,\n]/).map(n => n.trim()).filter(n => n.length > 0);
            const tema = document.getElementById('tema').value;
            const box = document.getElementById('containerCrachas');
            box.innerHTML = '';

            lista.forEach(completo => {
                const tratado = determineProcessedName(completo, lista);
                const el = document.createElement('div');
                el.className = `cracha ${tema}`;
                const nomeTxt = document.createElement('h1');
                nomeTxt.className = 'nome';
                nomeTxt.textContent = tratado.toUpperCase();
                el.appendChild(nomeTxt);
                box.appendChild(el);
            });
        }
    </script>
</body>
</html>
