<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crachás Sacramentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 80vw;
            max-width: 600px;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            margin-top: 5px;
        }
        .btn {
            padding: 10px 20px;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-print { background-color: #27ae60; margin-left: 10px; }

        .container {
            width: 21cm;
            background-color: white;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-content: flex-start;
            padding: 0;
        }

        .cracha {
            width: 9.5cm;
            height: 6.5cm;
            margin: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            box-sizing: border-box;
        }

        .nome {
            font-size: 32px;
            font-weight: bold;
            color: #000;
            text-transform: uppercase;
            text-align: center;
            padding: 0 15px;
            word-wrap: break-word;
            max-width: 90%;
            line-height: 1.1;
        }

        .fundo-crisma { background-image: url('https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/crachaSacramento/main/Crisma.png'); }
        .fundo-eucaristia { background-image: url('https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/crachaSacramento/main/Eucaristia.png'); }

        @media print {
            .controls { display: none; }
            body { background: none; padding: 0; }
            .container { box-shadow: none; width: 21cm; height: 29.7cm; }
            .cracha { 
                margin: 0; 
                border: 0.1px solid #ddd; /* Guia suave para corte */
                border-radius: 0;
            }
            .cracha:nth-child(8n+9) { page-break-before: always; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label>1. Selecione o Sacramento:</label>
        <select id="tema">
            <option value="fundo-eucaristia">Eucaristia</option>
            <option value="fundo-crisma">Crisma</option>
        </select>

        <label style="margin-top:10px;">2. Cole a lista de nomes:</label>
        <textarea id="inputNomes" rows="6" placeholder="Ex: João Silva, João Santos, Maria..."></textarea>
        
        <div style="margin-top:10px;">
            <button class="btn" onclick="gerar()">Gerar Crachás</button>
            <button class="btn btn-print" onclick="window.print()">Imprimir</button>
        </div>
    </div>

    <div class="container" id="containerCrachas"></div>

    <script>
        const PREPOSICOES = ['de', 'do', 'da', 'dos', 'das'];

        /** Lógica Original de Unicidade **/
        function determineProcessedName(name, allNames) {
            const originalNameParts = name.split(' ');
            const firstName = originalNameParts[0];
            const firstNameCount = allNames.filter(n => n.split(' ')[0].toUpperCase() === firstName.toUpperCase()).length;

            if (firstNameCount === 1 || originalNameParts.length === 1) {
                return firstName;
            }

            let currentNameParts = [firstName];
            let i = 1;

            while (i < originalNameParts.length) {
                let nextPart = originalNameParts[i];
                currentNameParts.push(nextPart);
                i++;

                if (PREPOSICOES.includes(nextPart.toLowerCase()) && i < originalNameParts.length) {
                    currentNameParts.push(originalNameParts[i]);
                    i++;
                }

                const currentSegment = currentNameParts.join(' ');
                let isUniquePrefix = true;

                for (const otherName of allNames) {
                    if (otherName.toUpperCase() === name.toUpperCase()) continue;
                    if (otherName.toUpperCase().startsWith(currentSegment.toUpperCase())) {
                        isUniquePrefix = false;
                        break;
                    }
                }

                if (isUniquePrefix) return currentSegment;
            }
            return name;
        }

        function gerar() {
            const texto = document.getElementById('inputNomes').value;
            const listaOriginal = texto.split(/[,\n]/).map(n => n.trim()).filter(n => n.length > 0);
            const tema = document.getElementById('tema').value;
            const container = document.getElementById('containerCrachas');
            
            container.innerHTML = '';

            listaOriginal.forEach(nomeCompleto => {
                const nomeTratado = determineProcessedName(nomeCompleto, listaOriginal);
                
                const cracha = document.createElement('div');
                cracha.className = `cracha ${tema}`;
                
                const h1 = document.createElement('h1');
                h1.className = 'nome';
                h1.textContent = nomeTratado.toUpperCase();
                
                cracha.appendChild(h1);
                container.appendChild(cracha);
            });
        }
    </script>
</body>
</html>
