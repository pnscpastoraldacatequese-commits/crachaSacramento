<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crachás com Bordas de Recorte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 80vw;
            max-width: 600px;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            resize: vertical;
        }
        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }
        .btn-generate { background-color: #4A90E2; }
        .btn-print { background-color: #27ae60; }

        .container {
            width: 21cm;
            background-color: white;
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            padding: 0;
            margin: 0 auto;
        }

        /* --- Estilo do Crachá com Borda de Recorte --- */
        .cracha {
            width: 9.5cm;
            height: 6.5cm;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            
            /* Borda visível para corte */
            border: 1px solid #000; 
            margin: 2px; /* Margem pequena na tela para separação visual */
        }

        .nome {
            font-size: 32px;
            font-weight: bold;
            color: #000;
            text-transform: uppercase;
            text-align: center;
            padding: 0 20px;
            word-wrap: break-word;
            max-width: 90%;
            z-index: 2;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .fundo-crisma { background-image: url('https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/crachaSacramento/main/Crisma.png'); }
        .fundo-eucaristia { background-image: url('https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/crachaSacramento/main/Eucaristia.png'); }

        @media print {
            body { background: white; padding: 0; }
            .controls { display: none; }
            .container { 
                box-shadow: none; 
                width: 21cm; 
                height: 29.7cm; 
                padding: 0.5cm; /* Margem de segurança da impressora */
            }
            .cracha { 
                margin: 0; /* Remove margem para as bordas encostarem e facilitar o corte único */
                border: 0.5pt solid #000; /* Linha preta fina para impressão */
                page-break-inside: avoid;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            /* Garante quebra de página a cada 8 crachás */
            .cracha:nth-child(8n+9) { page-break-before: always; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label>1. Escolha o Sacramento:</label>
        <select id="tema">
            <option value="fundo-eucaristia">Eucaristia</option>
            <option value="fundo-crisma">Crisma</option>
        </select>

        <label style="margin-top:10px;">2. Insira os Nomes:</label>
        <textarea id="inputNomes" rows="5" placeholder="Digite os nomes separados por vírgula ou um por linha..."></textarea>
        
        <div class="btn-group">
            <button class="btn btn-generate" onclick="gerar()">Gerar Crachás</button>
            <button class="btn btn-print" onclick="window.print()">Imprimir Agora</button>
        </div>
    </div>

    <div class="container" id="containerCrachas"></div>

    <script>
        const PREPOSICOES = ['de', 'do', 'da', 'dos', 'das'];

        function determineProcessedName(name, allNames) {
            const parts = name.split(' ');
            const firstName = parts[0];
            const count = allNames.filter(n => n.split(' ')[0].toUpperCase() === firstName.toUpperCase()).length;

            if (count === 1 || parts.length === 1) return firstName;

            let current = [firstName];
            for (let i = 1; i < parts.length; i++) {
                current.push(parts[i]);
                if (PREPOSICOES.includes(parts[i].toLowerCase()) && parts[i+1]) {
                    current.push(parts[i+1]);
                    i++;
                }
                const segment = current.join(' ');
                let isUnique = true;
                for (const other of allNames) {
                    if (other.toUpperCase() === name.toUpperCase()) continue;
                    if (other.toUpperCase().startsWith(segment.toUpperCase())) {
                        isUnique = false;
                        break;
                    }
                }
                if (isUnique) return segment;
            }
            return name;
        }

        function gerar() {
            const raw = document.getElementById('inputNomes').value;
            const lista = raw.split(/[,\n]/).map(n => n.trim()).filter(n => n.length > 0);
            const tema = document.getElementById('tema').value;
            const box = document.getElementById('containerCrachas');
            
            box.innerHTML = '';

            lista.forEach(completo => {
                const tratado = determineProcessedName(completo, lista);
                const el = document.createElement('div');
                el.className = `cracha ${tema}`;
                
                const nomeTxt = document.createElement('h1');
                nomeTxt.className = 'nome';
                nomeTxt.textContent = tratado.toUpperCase();
                
                el.appendChild(nomeTxt);
                box.appendChild(el);
            });
        }
    </script>
</body>
</html>
